<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lingua Flux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Literata:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f0e8;
      --panel: rgba(255,255,255,0.72);
      --ink: #1f1c18;
      --muted: #6b6157;
      --accent: #0f766e;
      --accent2: #d97706;
      --line: rgba(31,28,24,0.12);
      --shadow: 0 18px 50px rgba(44, 31, 12, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15,118,110,0.12), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(217,119,6,0.12), transparent 22%),
        linear-gradient(180deg, #faf5ee, #efe4d4);
    }
    .shell {
      width: min(1100px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 1rem 0 2rem;
    }
    .hero, .panel {
      background: var(--panel);
      backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 1.4rem;
      margin-bottom: 1rem;
    }
    .eyebrow {
      margin: 0 0 0.5rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
      color: var(--accent);
    }
    h1, h2 {
      margin: 0;
      font-family: "Literata", serif;
      line-height: 1;
    }
    h1 {
      font-size: clamp(2.2rem, 5vw, 4.4rem);
      max-width: 10ch;
    }
    .hero-copy {
      margin-top: 1rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 62ch;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .panel {
      padding: 1.2rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.9rem;
    }
    select, textarea, button {
      width: 100%;
      font: inherit;
      border-radius: 18px;
    }
    select, textarea {
      margin-top: 0.45rem;
      padding: 0.95rem 1rem;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.78);
      color: var(--ink);
    }
    textarea {
      min-height: 220px;
      resize: vertical;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }
    .controls.three {
      grid-template-columns: 1fr 1fr auto;
      align-items: end;
    }
    button {
      border: none;
      padding: 0.95rem 1rem;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent), #14b8a6);
      transition: transform 160ms ease, opacity 160ms ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
    .swap {
      background: linear-gradient(135deg, var(--accent2), #f59e0b);
      width: 56px;
    }
    .status {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      background: rgba(15,118,110,0.1);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
    }
    .meta {
      margin-top: 1rem;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.95rem;
    }
    @media (max-width: 860px) {
      .grid, .controls, .controls.three { grid-template-columns: 1fr; }
      .swap { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <p class="eyebrow">Groq Translator</p>
      <h1>Lingua Flux</h1>
      <p class="hero-copy">
        Translate text from one language into another with tone preservation, fast turnaround, and optional formality control.
      </p>
    </section>

    <section class="grid">
      <div class="panel">
        <div class="controls three">
          <label>
            From
            <select id="sourceLang">
              <option value="Auto detect" selected>Auto detect</option>
              <option>English</option>
              <option>Spanish</option>
              <option>French</option>
              <option>German</option>
              <option>Italian</option>
              <option>Portuguese</option>
              <option>Chinese</option>
              <option>Japanese</option>
              <option>Korean</option>
              <option>Arabic</option>
              <option>Hindi</option>
              <option>Malay</option>
              <option>Indonesian</option>
              <option>Russian</option>
              <option>Tamil</option>
              <option>Myanmar</option>
            </select>
          </label>

          <label>
            To
            <select id="targetLang">
              <option>English</option>
              <option selected>Spanish</option>
              <option>French</option>
              <option>German</option>
              <option>Italian</option>
              <option>Portuguese</option>
              <option>Chinese</option>
              <option>Japanese</option>
              <option>Korean</option>
              <option>Arabic</option>
              <option>Hindi</option>
              <option>Malay</option>
              <option>Indonesian</option>
              <option>Russian</option>
              <option>Tamil</option>
              <option>Myanmar</option>
            </select>
          </label>

          <button class="swap" id="swapBtn" type="button">⇄</button>
        </div>

        <label>
          Tone
          <select id="toneSelect">
            <option selected>Natural</option>
            <option>Formal</option>
            <option>Casual</option>
            <option>Professional</option>
            <option>Friendly</option>
          </select>
        </label>

        <label>
          Original Text
          <textarea id="inputText" placeholder="Type or paste text here..."></textarea>
        </label>

        <button id="translateBtn" type="button">Translate</button>
        <div class="status" id="statusPill">Idle</div>
      </div>

      <div class="panel">
        <label>
          Translation
          <textarea id="outputText" placeholder="Your translation will appear here..." readonly></textarea>
        </label>

        <div class="controls">
          <button id="copyBtn" type="button">Copy Translation</button>
          <button id="clearBtn" type="button">Clear</button>
        </div>

        <div class="meta" id="metaText">
          Ready to translate between languages.
        </div>
      </div>
    </section>
  </div>

  <script>
    const GROQ_API_KEY = "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";
    const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
    const MODEL = "llama-3.3-70b-versatile";

    const sourceLang = document.getElementById("sourceLang");
    const targetLang = document.getElementById("targetLang");
    const toneSelect = document.getElementById("toneSelect");
    const inputText = document.getElementById("inputText");
    const outputText = document.getElementById("outputText");
    const translateBtn = document.getElementById("translateBtn");
    const swapBtn = document.getElementById("swapBtn");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusPill = document.getElementById("statusPill");
    const metaText = document.getElementById("metaText");

    function setStatus(text) {
      statusPill.textContent = text;
    }

    function extractJson(text) {
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error("Model did not return valid JSON.");
      return JSON.parse(match[0]);
    }

    async function translateText() {
      const source = sourceLang.value;
      const target = targetLang.value;
      const tone = toneSelect.value;
      const text = inputText.value.trim();

      if (!text) {
        setStatus("Enter text first");
        inputText.focus();
        return;
      }

      translateBtn.disabled = true;
      setStatus("Translating...");
      metaText.textContent = "Sending request to Groq...";

      const systemPrompt = [
        "You are a precise multilingual translator.",
        "Return only valid JSON with no markdown.",
        'Schema: {"detectedSource":"string","translation":"string","notes":"string"}',
        "Preserve meaning, tone, names, formatting, and punctuation when possible.",
        "Do not explain the translation unless a short note is useful."
      ].join(" ");

      const userPrompt = [
        `Source language: ${source}`,
        `Target language: ${target}`,
        `Tone preference: ${tone}`,
        "Translate the following text:",
        text
      ].join("\n");

      try {
        const response = await fetch(GROQ_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${GROQ_API_KEY}`
          },
          body: JSON.stringify({
            model: MODEL,
            temperature: 0.2,
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: userPrompt }
            ]
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Groq request failed: ${response.status} ${errorText}`);
        }

        const payload = await response.json();
        const content = payload.choices?.[0]?.message?.content || "";
        const data = extractJson(content);

        outputText.value = data.translation || "";
        metaText.textContent = `Detected: ${data.detectedSource || source}. ${data.notes || ""}`.trim();
        setStatus("Done");
      } catch (error) {
        setStatus("Error");
        metaText.textContent = error.message;
      } finally {
        translateBtn.disabled = false;
      }
    }

    swapBtn.addEventListener("click", () => {
      if (sourceLang.value === "Auto detect") return;
      const from = sourceLang.value;
      sourceLang.value = targetLang.value;
      targetLang.value = from;

      const originalInput = inputText.value;
      inputText.value = outputText.value;
      outputText.value = originalInput;
    });

    copyBtn.addEventListener("click", async () => {
      if (!outputText.value.trim()) return;
      await navigator.clipboard.writeText(outputText.value);
      setStatus("Copied");
    });

    clearBtn.addEventListener("click", () => {
      inputText.value = "";
      outputText.value = "";
      metaText.textContent = "Ready to translate between languages.";
      setStatus("Idle");
    });

    translateBtn.addEventListener("click", translateText);
  </script>
</body>
</html>
